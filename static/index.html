<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas PWA</title>
    
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2933/2933116.png">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Mi Patrimonio</h2>
        </div>
        
        <div class="balance-card">
            <p class="balance-title">Balance General</p>
            <h1 class="balance-amount" id="total-balance">$ 0</h1>
        </div>

        <h3 class="section-title">Mis Cuentas</h3>
        <div class="accounts-list" id="accounts-container">
            </div>
<h3 class="section-title">Últimos Movimientos</h3>
        <div class="history-list" id="history-container">
            <p style="text-align: center; color: #6b7280; font-size: 14px;">Cargando movimientos...</p>
        </div>
        <div class="action-buttons">
            <button onclick="abrirModal('modal-cuenta')" class="btn-secondary">Nueva Cuenta</button>
            <button onclick="abrirModal('modal-categoria')" class="btn-secondary">Nueva Categoría</button>
            <button onclick="prepararModalTransferencia()" class="btn-secondary">Transferir</button>
        </div>
    </div>

    <button class="fab" onclick="prepararModalTransaccion()">+</button>

    <div class="modal-overlay" id="modal-transaccion">
        <div class="modal">
            <button class="btn-close" onclick="cerrarModal('modal-transaccion')">&times;</button>
            <div class="modal-header">Registrar Movimiento</div>
            <form id="form-transaccion" onsubmit="guardarTransaccion(event)">
                <div class="form-group">
                    <label>Tipo</label>
                    <select class="form-control" id="tipo" required onchange="filtrarCategorias()">
                        <option value="Gasto">Gasto</option>
                        <option value="Ingreso">Ingreso</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Monto</label>
                    <input type="number" class="form-control" id="monto" required min="1" placeholder="Ej. 15000">
                </div>
                <div class="form-group">
                    <label>Fecha</label>
                    <input type="date" class="form-control" id="fecha" required>
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <input type="text" class="form-control" id="descripcion" required placeholder="Ej. Almuerzo, Pasajes...">
                </div>
                <div class="form-group">
                    <label>Cuenta</label>
                    <select class="form-control" id="cuenta_id" required></select>
                </div>
                <div class="form-group">
                    <label>Categoría</label>
                    <select class="form-control" id="categoria_id" required></select>
                </div>
                <button type="submit" class="btn-submit">Guardar Registro</button>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="modal-cuenta">
        <div class="modal">
            <button class="btn-close" onclick="cerrarModal('modal-cuenta')">&times;</button>
            <div class="modal-header">Añadir Cuenta Bancaria</div>
            <form id="form-cuenta" onsubmit="guardarCuenta(event)">
                <div class="form-group">
                    <label>Nombre de la Cuenta</label>
                    <input type="text" class="form-control" id="nueva_cuenta_nombre" required placeholder="Ej. Nu, Efectivo">
                </div>
                <div class="form-group">
                    <label>Tipo</label>
                    <select class="form-control" id="nueva_cuenta_tipo" required>
                        <option value="Ahorros">Ahorros</option>
                        <option value="Corriente">Corriente</option>
                        <option value="Efectivo">Efectivo</option>
                        <option value="Tarjeta de Crédito">Tarjeta de Crédito</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Saldo Inicial</label>
                    <input type="number" class="form-control" id="nueva_cuenta_saldo" required value="0">
                </div>
                <button type="submit" class="btn-submit">Guardar Cuenta</button>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="modal-categoria">
        <div class="modal">
            <button class="btn-close" onclick="cerrarModal('modal-categoria')">&times;</button>
            <div class="modal-header">Añadir Categoría</div>
            <form id="form-categoria" onsubmit="guardarCategoria(event)">
                <div class="form-group">
                    <label>Nombre de la Categoría</label>
                    <input type="text" class="form-control" id="nueva_categoria_nombre" required placeholder="Ej. Transporte, Suscripciones">
                </div>
                <div class="form-group">
                    <label>Naturaleza</label>
                    <select class="form-control" id="nueva_categoria_tipo" required>
                        <option value="Gasto">Gasto (Salida de dinero)</option>
                        <option value="Ingreso">Ingreso (Entrada de dinero)</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit">Guardar Categoría</button>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="modal-transferencia">
        <div class="modal">
            <button class="btn-close" onclick="cerrarModal('modal-transferencia')">&times;</button>
            <div class="modal-header">Transferir Dinero</div>
            <form id="form-transferencia" onsubmit="guardarTransferencia(event)">
                <div class="form-group">
                    <label>Cuenta Origen (De dónde sale)</label>
                    <select class="form-control" id="origen_id" required></select>
                </div>
                <div class="form-group">
                    <label>Cuenta Destino (A dónde entra)</label>
                    <select class="form-control" id="destino_id" required></select>
                </div>
                <div class="form-group">
                    <label>Monto</label>
                    <input type="number" class="form-control" id="monto_transferencia" required min="1" placeholder="Ej. 50000">
                </div>
                <div class="form-group">
                    <label>Fecha</label>
                    <input type="date" class="form-control" id="fecha_transferencia" required>
                </div>
                <div class="form-group">
                    <label>Motivo o Descripción (Opcional)</label>
                    <input type="text" class="form-control" id="descripcion_transferencia" value="Movimiento interno">
                </div>
                <button type="submit" class="btn-submit">Realizar Transferencia</button>
            </form>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
